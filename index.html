<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gx Dikzz</title>

<style>
    body {
        margin: 0;
        background: black;
        color: white;
        text-align: center;
        font-family: Arial, sans-serif;
        overflow: hidden;
    }

    .container {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        z-index: 3;
    }

    button {
        padding: 12px 25px;
        border: none;
        border-radius: 10px;
        background: red;
        color: white;
        cursor: pointer;
    }

    #video {
        position: fixed;
        width: 100vw;
        height: 100vh;
        object-fit: cover;
        z-index: 1;
    }

    #tapLayer {
        position: fixed;
        width: 100vw;
        height: 100vh;
        z-index: 2;
        background: transparent;
        display: none;
    }
</style>
</head>

<body>

<div class="container" id="menu">
    <h1>Gx Dikzz</h1>
    <p>Tekan tombol untuk melanjutkan</p>
    <button onclick="start()">Tap disini</button>
</div>

<video id="video" src="media/video.mp4" playsinline></video>
<div id="tapLayer"></div>

<script>
let tapCount = 0;
let tapTimer;

function start() {
    const video = document.getElementById("video");
    const menu = document.getElementById("menu");
    const layer = document.getElementById("tapLayer");

    menu.style.display = "none";
    layer.style.display = "block";

    video.play();

    if (video.requestFullscreen) {
        video.requestFullscreen();
    }

    // 🔁 Loop otomatis (versi JS)
    video.addEventListener("ended", () => {
        video.currentTime = 0;
        video.play();
    });

    // Auto play kalau dipause sebelum unlock
    video.addEventListener("pause", () => {
        if (tapCount < 5) video.play();
    });
}

// Hitung tap
document.getElementById("tapLayer").addEventListener("click", () => {
    tapCount++;

    clearTimeout(tapTimer);
    tapTimer = setTimeout(() => {
        tapCount = 0;
    }, 1500);

    const video = document.getElementById("video");

    if (tapCount === 5) {
        video.pause();
    }

    if (tapCount === 10) {
        document.body.innerHTML = "<h1 style='color:white;text-align:center;margin-top:50%'>Closed</h1>";
    }
});
</script>

</body>
</html>
