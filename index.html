<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Gx Dikzz Verification</title>

<script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Poppins,sans-serif;
}

body{
    height:100vh;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#050816;
    color:white;
}

/* BACKGROUND */
.bg{
    position:fixed;
    width:100%;
    height:100%;
    overflow:hidden;
}

.circle{
    position:absolute;
    border-radius:50%;
    filter:blur(70px);
    animation:float 10s infinite alternate ease-in-out;
}

.c1{
    width:300px;
    height:300px;
    background:#00ffff;
    top:-50px;
    left:-50px;
}

.c2{
    width:350px;
    height:350px;
    background:#9333ea;
    bottom:-80px;
    right:-50px;
    animation-duration:13s;
}

.c3{
    width:250px;
    height:250px;
    background:#38bdf8;
    top:40%;
    left:50%;
    transform:translate(-50%,-50%);
    animation-duration:8s;
}

@keyframes float{
    from{
        transform:translateY(-20px)
        translateX(-20px);
    }
    to{
        transform:translateY(20px)
        translateX(20px);
    }
}

/* PARTICLES */
.particle{
    position:absolute;
    width:4px;
    height:4px;
    background:white;
    border-radius:50%;
    opacity:.7;
    animation:move linear infinite;
}

@keyframes move{
    from{
        transform:translateY(100vh);
    }
    to{
        transform:translateY(-100vh);
    }
}

/* CARD */
.card{
    position:relative;
    width:380px;
    padding:35px;
    border-radius:30px;
    background:
    rgba(255,255,255,0.08);

    border:
    1px solid rgba(255,255,255,0.1);

    backdrop-filter:blur(20px);

    z-index:5;

    box-shadow:
    0 0 40px rgba(0,255,255,.15),
    0 0 80px rgba(147,51,234,.2);

    animation:cardGlow 4s infinite alternate;
}

@keyframes cardGlow{
    from{
        box-shadow:
        0 0 30px rgba(0,255,255,.15),
        0 0 60px rgba(147,51,234,.15);
    }
    to{
        box-shadow:
        0 0 60px rgba(0,255,255,.35),
        0 0 100px rgba(147,51,234,.35);
    }
}

.logo{
    font-size:32px;
    font-weight:900;
    text-align:center;

    background:
    linear-gradient(
    45deg,
    #38bdf8,
    #9333ea,
    #00ffff
    );

    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;

    margin-bottom:15px;
}

.title{
    text-align:center;
    font-size:24px;
    font-weight:bold;
    margin-bottom:10px;
}

.desc{
    text-align:center;
    opacity:.8;
    line-height:1.7;
    font-size:15px;
    margin-bottom:30px;
}

/* STATUS */
.status{
    margin-top:20px;
    text-align:center;
    font-size:15px;
    opacity:.8;
}

/* LOADING */
.loading{
    width:100%;
    height:10px;
    border-radius:20px;
    background:rgba(255,255,255,.08);
    overflow:hidden;
    margin-top:20px;
    display:none;
}

.bar{
    width:0%;
    height:100%;
    background:
    linear-gradient(
    90deg,
    #38bdf8,
    #9333ea,
    #00ffff
    );

    transition:.2s;
}

/* WATERMARK */
.footer{
    margin-top:25px;
    text-align:center;
    font-size:13px;
    opacity:.5;
}

</style>
</head>

<body>

<!-- BACKGROUND -->
<div class="bg">

<div class="circle c1"></div>
<div class="circle c2"></div>
<div class="circle c3"></div>

</div>

<!-- CARD -->
<div class="card">

<div class="logo">
Gx Dikzz
</div>

<div class="title">
Human Verification
</div>

<div class="desc">

Verifikasi dibuat oleh
<b>Gx Dikzz</b>,
untuk menghindari bot jahat.
Pastikan Anda Manusia 😹

</div>

<!-- TURNSTILE -->
<div class="cf-turnstile"
data-sitekey="0x4AAAAAADMiaLMcFS1xGec4"
data-callback="verified">
</div>

<div class="loading"
id="loading">

<div class="bar"
id="bar"></div>

</div>

<div class="status"
id="status">

Menunggu verifikasi...

</div>

<div class="footer">

Security System • Gx Dikzz

</div>

</div>

<script>

/* PARTICLES */

for(let i=0;i<50;i++){

    let p =
    document.createElement("div");

    p.className =
    "particle";

    p.style.left =
    Math.random()*100+"vw";

    p.style.animationDuration =
    5+Math.random()*10+"s";

    p.style.opacity =
    Math.random();

    document.body.appendChild(p);
}

/* VERIFIED */

function verified(){

    const loading =
    document.getElementById("loading");

    const bar =
    document.getElementById("bar");

    const status =
    document.getElementById("status");

    loading.style.display =
    "block";

    status.innerHTML =
    "Memeriksa keamanan browser...";

    let width = 0;

    let interval =
    setInterval(()=>{

        width +=
        Math.random()*15;

        bar.style.width =
        width+"%";

        navigator.vibrate?.(10);

        if(width >= 100){

            clearInterval(interval);

            status.innerHTML =
            "Verifikasi berhasil 😹";

            setTimeout(()=>{

                window.location.href =
                "home.html";

            },1200);
        }

    },120);
}

</script>

</body>
</html>
