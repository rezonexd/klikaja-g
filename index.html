<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Gx Dikzz Verification</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Poppins,sans-serif;
}

body{
    background:#050816;
    overflow:hidden;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
}

/* BACKGROUND */

.bg{
    position:fixed;
    width:100%;
    height:100%;
    overflow:hidden;
}

.orb{
    position:absolute;
    border-radius:50%;
    filter:blur(80px);
    animation:float 8s infinite alternate ease-in-out;
}

.o1{
    width:320px;
    height:320px;
    background:#00ffff;
    top:-80px;
    left:-80px;
}

.o2{
    width:300px;
    height:300px;
    background:#9333ea;
    bottom:-100px;
    right:-50px;
    animation-duration:11s;
}

.o3{
    width:250px;
    height:250px;
    background:#38bdf8;
    top:40%;
    left:55%;
    animation-duration:6s;
}

@keyframes float{
    from{
        transform:translateY(-20px)
        translateX(-20px);
    }
    to{
        transform:translateY(20px)
        translateX(20px);
    }
}

/* PARTICLE */

.particle{
    position:absolute;
    width:3px;
    height:3px;
    background:white;
    border-radius:50%;
    opacity:.7;
    animation:particle linear infinite;
}

@keyframes particle{
    from{
        transform:translateY(100vh);
    }
    to{
        transform:translateY(-100vh);
    }
}

/* CARD */

.card{
    position:relative;
    width:380px;
    padding:35px;
    border-radius:30px;

    background:
    rgba(255,255,255,0.08);

    border:
    1px solid rgba(255,255,255,0.1);

    backdrop-filter:blur(20px);

    z-index:5;

    box-shadow:
    0 0 50px rgba(0,255,255,.15),
    0 0 100px rgba(147,51,234,.2);
}

.logo{
    text-align:center;
    font-size:34px;
    font-weight:900;

    background:
    linear-gradient(
    45deg,
    #38bdf8,
    #9333ea,
    #00ffff
    );

    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;

    margin-bottom:10px;
}

.title{
    text-align:center;
    font-size:26px;
    font-weight:bold;
    margin-bottom:15px;
}

.desc{
    text-align:center;
    opacity:.85;
    line-height:1.7;
    margin-bottom:30px;
}

/* VERIFY */

.verify{
    display:flex;
    align-items:center;
    gap:15px;

    background:
    rgba(255,255,255,.06);

    border:
    1px solid rgba(255,255,255,.1);

    padding:18px;
    border-radius:18px;

    cursor:pointer;

    transition:.3s;
}

.verify:hover{
    background:
    rgba(255,255,255,.1);
}

.checkbox{
    width:30px;
    height:30px;

    border-radius:8px;

    border:
    2px solid white;

    display:flex;
    justify-content:center;
    align-items:center;

    font-weight:bold;
    font-size:18px;

    transition:.3s;
}

.label{
    font-size:16px;
    font-weight:500;
}

/* STATUS */

.status{
    margin-top:20px;
    text-align:center;
    opacity:.8;
}

/* LOADING */

.loading{
    width:100%;
    height:10px;
    border-radius:20px;
    overflow:hidden;

    background:
    rgba(255,255,255,.08);

    margin-top:20px;

    display:none;
}

.bar{
    width:0%;
    height:100%;

    background:
    linear-gradient(
    90deg,
    #38bdf8,
    #9333ea,
    #00ffff
    );

    transition:.2s;
}

/* FOOTER */

.footer{
    text-align:center;
    margin-top:25px;
    opacity:.45;
    font-size:13px;
}

</style>
</head>

<body>

<div class="bg">

<div class="orb o1"></div>
<div class="orb o2"></div>
<div class="orb o3"></div>

</div>

<div class="card">

<div class="logo">
Gx Dikzz
</div>

<div class="title">
Human Verification
</div>

<div class="desc">

Verifikasi dibuat oleh
<b>Gx Dikzz</b>,
untuk menghindari bot jahat.
Pastikan Anda Manusia 😹

</div>

<!-- VERIFY -->

<div class="verify"
id="verify">

<div class="checkbox"
id="checkbox"></div>

<div class="label">

Saya bukan robot

</div>

</div>

<!-- LOADING -->

<div class="loading"
id="loading">

<div class="bar"
id="bar"></div>

</div>

<div class="status"
id="status">

Menunggu verifikasi...

</div>

<div class="footer">

AI Security • Gx Dikzz

</div>

</div>

<script>

/* PARTICLE */

for(let i=0;i<60;i++){

let p =
document.createElement("div");

p.className =
"particle";

p.style.left =
Math.random()*100+"vw";

p.style.animationDuration =
5+Math.random()*10+"s";

p.style.opacity =
Math.random();

document.body.appendChild(p);
}

/* DETECTION */

let mouseMove = 0;
let touchMove = 0;
let clicked = false;
let suspicious = false;
let startTime = Date.now();

/* MOUSE */

window.addEventListener(
"mousemove",
()=>{

mouseMove++;

}
);

/* TOUCH */

window.addEventListener(
"touchmove",
()=>{

touchMove++;

}
);

/* BOT DETECT */

if(
navigator.webdriver ||
!window.navigator.userAgent ||
window.outerWidth === 0
){
suspicious = true;
}

/* TAB CHECK */

document.addEventListener(
"visibilitychange",
()=>{

if(document.hidden){
suspicious = true;
}

}
);

/* VERIFY */

document
.getElementById("verify")
.onclick = ()=>{

if(clicked) return;

clicked = true;

const checkbox =
document.getElementById("checkbox");

const loading =
document.getElementById("loading");

const bar =
document.getElementById("bar");

const status =
document.getElementById("status");

/* BASIC HUMAN ANALYSIS */

let humanScore = 0;

/* movement */

if(mouseMove > 5)
humanScore += 30;

if(touchMove > 2)
humanScore += 30;

/* time */

if(Date.now() - startTime > 2000)
humanScore += 20;

/* suspicious */

if(!suspicious)
humanScore += 20;

/* RESULT */

checkbox.innerHTML = "✓";

checkbox.style.background =
humanScore >= 60
? "#22c55e"
: "red";

checkbox.style.borderColor =
humanScore >= 60
? "#22c55e"
: "red";

loading.style.display =
"block";

let width = 0;

let interval =
setInterval(()=>{

width +=
Math.random()*15;

bar.style.width =
width+"%";

navigator.vibrate?.(10);

if(width >= 100){

clearInterval(interval);

if(humanScore >= 60){

status.innerHTML =
"Verifikasi berhasil 😹";

speak(
"Akses diterima"
);

setTimeout(()=>{

window.location.href =
"home.html";

},1200);

}else{

status.innerHTML =
"Bot terdeteksi 😹";

speak(
"Akses ditolak"
);

clicked = false;

setTimeout(()=>{

loading.style.display =
"none";

bar.style.width =
"0%";

checkbox.innerHTML =
"";

checkbox.style.background =
"transparent";

checkbox.style.borderColor =
"white";

status.innerHTML =
"Menunggu verifikasi...";

},2500);
}

}

},120);

};

/* AI VOICE */

function speak(text){

let speech =
new SpeechSynthesisUtterance(text);

speech.lang = "id-ID";

speech.pitch = 0.8;

speech.rate = 1;

window.speechSynthesis.speak(speech);
}

</script>

</body>
</html>
