<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>System UI</title>

<style>
    body {
        margin: 0;
        background: black;
        overflow: hidden;
        font-family: monospace;
        color: #00ff9d;
    }

    #video {
        position: fixed;
        width: 100vw;
        height: 100vh;
        object-fit: cover;
        z-index: 1;
    }

    /* Overlay glitch */
    #glitch {
        position: fixed;
        width: 100%;
        height: 100%;
        background: repeating-linear-gradient(
            0deg,
            rgba(0,0,0,0.2),
            rgba(0,0,0,0.2) 2px,
            transparent 2px,
            transparent 4px
        );
        animation: flicker 0.1s infinite;
        z-index: 2;
        display: none;
    }

    @keyframes flicker {
        0% {opacity: 0.2;}
        50% {opacity: 0.4;}
        100% {opacity: 0.2;}
    }

    #ui {
        position: fixed;
        top: 20px;
        left: 10px;
        z-index: 3;
        display: none;
    }

    #fakeError {
        position: fixed;
        bottom: 30px;
        left: 20px;
        right: 20px;
        color: red;
        font-size: 14px;
        z-index: 3;
        display: none;
    }

    #menu {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        text-align: center;
        color: white;
        z-index: 5;
    }

    button {
        padding: 12px 25px;
        border: none;
        border-radius: 10px;
        background: red;
        color: white;
        cursor: pointer;
    }

    #tapLayer {
        position: fixed;
        width: 100vw;
        height: 100vh;
        z-index: 4;
        display: none;
    }
</style>
</head>

<body>

<div id="menu">
    <h1>Gx Dikzz</h1>
    <p>Tekan tombol untuk melanjutkan</p>
    <button onclick="start()">Tap disini</button>
</div>

<video id="video" src="media/video.mp4" playsinline></video>

<div id="glitch"></div>
<div id="ui">SYSTEM PROCESS RUNNING...</div>
<div id="fakeError">
    SystemUI isn't responding...<br>
    Attempting to restart...
</div>

<div id="tapLayer"></div>

<script>
let tapCount = 0;
let tapTimer;

// Fake block back (ilusi doang)
history.pushState(null, "", location.href);
window.onpopstate = function () {
    history.pushState(null, "", location.href);
    alert("System Error ⚠️");
};

function start() {
    const video = document.getElementById("video");

    document.getElementById("menu").style.display = "none";
    document.getElementById("glitch").style.display = "block";
    document.getElementById("ui").style.display = "block";
    document.getElementById("fakeError").style.display = "block";
    document.getElementById("tapLayer").style.display = "block";

    video.play();

    // Loop
    video.addEventListener("ended", () => {
        video.currentTime = 0;
        video.play();
    });

    // Paksa play
    video.addEventListener("pause", () => {
        if (tapCount < 5) video.play();
    });

    // Fullscreen (kalau diizinkan)
    if (video.requestFullscreen) {
        video.requestFullscreen();
    }
}

// Tap system
document.getElementById("tapLayer").addEventListener("click", () => {
    tapCount++;

    clearTimeout(tapTimer);
    tapTimer = setTimeout(() => tapCount = 0, 1500);

    const video = document.getElementById("video");

    if (tapCount === 5) {
        video.pause();
    }

    if (tapCount === 10) {
        document.body.innerHTML = "<h1 style='color:red;text-align:center;margin-top:50%'>System Closed</h1>";
    }
});
</script>

</body>
</html>
