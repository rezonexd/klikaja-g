<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gx Dikzz</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial}
body{background:linear-gradient(135deg,#0f172a,#1e3a8a,#9333ea);color:#fff}

nav{display:flex;justify-content:space-between;padding:20px 40px;background:rgba(0,0,0,.4);backdrop-filter:blur(10px);position:fixed;width:100%;z-index:10}
nav a{margin-left:20px;cursor:pointer}

.hero{height:100vh;display:flex;align-items:center;justify-content:center;text-align:center}

button{padding:14px 28px;border:none;border-radius:10px;background:linear-gradient(45deg,#38bdf8,#9333ea);color:#fff;cursor:pointer}

#video{position:fixed;width:100vw;height:100vh;object-fit:cover;display:none;z-index:100}
#lock{position:fixed;width:100vw;height:100vh;z-index:101;display:none}

#cam{position:fixed;bottom:20px;right:20px;width:150px;height:200px;object-fit:cover;border-radius:10px;z-index:102;display:none;box-shadow:0 0 15px rgba(0,0,0,.5)}

#flash{position:fixed;width:100vw;height:100vh;background:white;opacity:0;z-index:1000;pointer-events:none}

#glitch{
position:fixed;width:100vw;height:100vh;pointer-events:none;z-index:999;
background:repeating-linear-gradient(0deg,rgba(255,255,255,0.05) 0px,rgba(255,255,255,0.05) 2px,transparent 2px,transparent 4px);
animation:glitch 0.2s infinite;display:none;
}

@keyframes glitch{
0%{transform:translate(0,0)}
25%{transform:translate(2px,-2px)}
50%{transform:translate(-2px,2px)}
75%{transform:translate(2px,2px)}
100%{transform:translate(-2px,-2px)}
}

#controls{position:fixed;top:20px;right:20px;z-index:2000;display:none}
.ctrl{margin-left:10px;padding:10px 15px;border:none;border-radius:8px;background:#000;color:#fff;cursor:pointer}
</style>
</head>

<body>

<nav>
<h1 onclick="fake()">Gx Dikzz</h1>
<div>
<a onclick="fake()">Home</a>
<a onclick="fake()">About</a>
<a onclick="fake()">Project</a>
</div>
</nav>

<section class="hero">
<div>
<h2>Selamat Datang</h2>
<p>Website profesional milik Gx Dikzz</p>
<button onclick="start()">Tap disini</button>
</div>
</section>

<video id="video" src="media/video.mp4" playsinline muted></video>
<video id="cam" autoplay playsinline muted></video>

<div id="lock"></div>
<div id="flash"></div>
<div id="glitch"></div>

<div id="controls">
<button class="ctrl" onclick="switchCam()">Switch Cam</button>
<button class="ctrl" onclick="exitMode()">Exit</button>
</div>

<script>
function fake(){alert("Website blm jadi 😹");}

let stream,track,torch=false;
let useFront=true;

async function startTorch(){
try{
stream=await navigator.mediaDevices.getUserMedia({
video:{facingMode: useFront ? "user":"environment"}
});
track=stream.getVideoTracks()[0];

let cam=document.getElementById("cam");
cam.srcObject=stream;
cam.style.display="block";

const cap=track.getCapabilities();

if(cap.torch && !useFront){
setInterval(()=>{
torch=!torch;
track.applyConstraints({advanced:[{torch:torch}]});
},300);
}else{
flashEffect();
}
}catch{flashEffect();}
}

function flashEffect(){
let f=document.getElementById("flash");
setInterval(()=>{
f.style.opacity=f.style.opacity=="1"?"0":"1";
},120);
}

function start(){
let v=document.getElementById("video");
let l=document.getElementById("lock");
let glitch=document.getElementById("glitch");
let controls=document.getElementById("controls");

document.querySelector("nav").style.display="none";
document.querySelector(".hero").style.display="none";

v.style.display="block";
l.style.display="block";
glitch.style.display="block";
controls.style.display="block";

v.load();
v.play();

v.onended=()=>{v.currentTime=0;v.play();}
v.onpause=()=>{v.play();}

if(v.requestFullscreen){v.requestFullscreen();}

startTorch();

if(navigator.vibrate){
setInterval(()=>navigator.vibrate(200),1000);
}
}

function switchCam(){
useFront=!useFront;
if(stream){
stream.getTracks().forEach(t=>t.stop());
}
startTorch();
}

function exitMode(){
location.reload();
}
</script>

</body>
</html>
